<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connect AI Coach Bridge to Claude</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;
         min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:#fff;border-radius:16px;padding:40px 32px;width:100%;max-width:380px;
          box-shadow:0 2px 16px rgba(0,0,0,.08)}
    h1{font-size:20px;font-weight:700;margin-bottom:8px}
    .sub{color:#6b7280;font-size:14px;margin-bottom:28px;line-height:1.5}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
    input{width:100%;padding:12px 14px;font-size:15px;border:1.5px solid #e5e7eb;
          border-radius:10px;outline:none;transition:border-color .2s}
    input:focus{border-color:#000}
    .btn{width:100%;padding:13px;margin-top:16px;font-size:15px;font-weight:600;
         background:#000;color:#fff;border:none;border-radius:10px;cursor:pointer;transition:opacity .2s}
    .btn:hover{opacity:.85}.btn:disabled{opacity:.5;cursor:not-allowed}
    .err{color:#dc2626;font-size:13px;margin-top:10px;min-height:18px}
    .sent{text-align:center;padding:8px 0}
    .sent .icon{font-size:40px;margin-bottom:16px}
    .sent p{color:#374151;line-height:1.6}
  </style>
</head>
<body>
<div class="card">
  <div id="form-view">
    <h1>Connect to Claude</h1>
    <p class="sub">Sign in to grant Claude access to your AI Coach Bridge training data.</p>
    <label for="email">Your email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" autofocus>
    <button class="btn" id="btn" onclick="send()">Send sign-in link</button>
    <div class="err" id="err"></div>
  </div>
  <div id="sent-view" class="sent" style="display:none">
    <div class="icon">✉️</div>
    <p><strong>Check your email</strong><br>We sent a sign-in link.<br>Click it to complete the connection.</p>
  </div>
</div>
<script>
  let pid = null;
  (async () => {
    try {
      const r = await fetch('/api/authorize-pending' + window.location.search);
      const d = await r.json();
      if (d.pending_id) {
        pid = d.pending_id;
      } else {
        document.getElementById('err').textContent = d.error || 'Failed to initialise. Please refresh.';
      }
    } catch {
      document.getElementById('err').textContent = 'Network error. Please refresh and try again.';
    }
  })();

  async function send() {
    const email = document.getElementById('email').value.trim();
    if (!email || !pid) return;
    const btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = 'Sending\u2026';
    document.getElementById('err').textContent = '';
    try {
      const r = await fetch('/api/authorize-send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, pending_id: pid})
      });
      if (r.ok) {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('sent-view').style.display = 'block';
      } else {
        const d = await r.json().catch(() => ({}));
        document.getElementById('err').textContent = d.error || 'Failed to send. Please try again.';
        btn.disabled = false; btn.textContent = 'Send sign-in link';
      }
    } catch {
      document.getElementById('err').textContent = 'Network error. Please try again.';
      btn.disabled = false; btn.textContent = 'Send sign-in link';
    }
  }
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
